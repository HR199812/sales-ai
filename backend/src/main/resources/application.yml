spring:
  application:
    name: sales-ai-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sales_ai_db}
      database: ${MONGODB_DATABASE:sales_ai_db}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.salesai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

# Claude responses are generated via the local `claude` CLI (Claude Code)
